name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact_path: src-tauri/target/release/bundle
            artifact_pattern: "*.dmg"
          - platform: ubuntu-22.04
            artifact_path: src-tauri/target/release/bundle
            artifact_pattern: "*.deb"
          - platform: windows-latest
            artifact_path: src-tauri/target/release/bundle
            artifact_pattern: "*.msi"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxss-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Find artifacts
        id: find_artifacts
        run: |
          echo "artifact_path=${{ matrix.artifact_path }}" >> $GITHUB_OUTPUT
          ls -la ${{ matrix.artifact_path }}/ 2>/dev/null || echo "No bundle directory"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}
          path: ${{ matrix.artifact_path }}
          retention-days: 1
